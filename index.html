<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoNateAI | Intelligence Platform</title>
    <link rel="stylesheet" href="src/styles/main.css">
    
    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>
    
    <!-- D3.js for Cognitive Graph -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- PapaParse for CSV Ingestion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="theme-dark">
    
    <!-- Auth Overlay -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Command Center Access</h2>
            <p id="auth-subtitle" class="subtitle">Authentication Required</p>
            <input type="email" id="auth-email" placeholder="Email" class="dark-input">
            <input type="password" id="auth-password" placeholder="Password" class="dark-input">
            <button id="auth-primary-btn" class="primary-btn">Initialize Session</button>
            <button id="auth-toggle-btn" class="text-link">Need an account? Register</button>
            <div id="auth-error" class="error-text hidden"></div>
        </div>
    </div>

    <!-- Main App (Hidden until authenticated) -->
    <div id="app" class="app-layout hidden">
        <aside id="sidebar" class="sidebar">
            <header class="sidebar-header">
                <h1>ANAI Core</h1>
                <p class="subtitle">Geo-Cognitive Intelligence</p>
            </header>
            <nav id="navigation" class="nav-links">
                <button class="nav-item active" data-view="geo-map">Geo Map</button>
                <button class="nav-item" data-view="cognitive-map">Cognitive Graph</button>
                <button class="nav-item" data-view="intelligence">Intelligence</button>
                <button class="nav-item" data-view="ingestion">Data Ingestion</button>
                <button class="nav-item" data-view="crm">Standard CRM</button>
            </nav>
            <div id="sidebar-content" class="sidebar-scroll">
                <!-- Content injected here -->
            </div>
            <div class="sidebar-footer">
                <div id="user-display" class="user-info text-xs mb-4"></div>
                <button id="auth-logout-btn" class="secondary-btn">Terminate Session</button>
            </div>
        </aside>
        
        <main class="main-content">
            <div id="view-geo-map" class="view-container active">
                <div id="mapbox-container"></div>
            </div>
            
            <div id="view-cognitive-map" class="view-container hidden">
                <div id="d3-container"></div>
            </div>

            <div id="view-intelligence" class="view-container hidden">
                <div class="p-8">
                    <h2 class="text-xl mb-4">Geo-Cognitive Intelligence</h2>
                    <div id="intelligence-content" class="grid-layout">
                        <!-- Intelligence components injected here -->
                    </div>
                </div>
            </div>
            
            <div id="view-ingestion" class="view-container hidden">
                <div class="ingestion-panel">
                    <h2>Data Pipeline</h2>
                    <p class="text-secondary">Drop Apify JSON or SalesNav CSV files here to ingest.</p>
                    <div id="drop-zone" class="drop-zone">
                        <span>Drag & Drop Files Here</span>
                        <input type="file" id="file-upload" accept=".csv,.json" class="hidden">
                    </div>
                    <div id="ingestion-log" class="console-log"></div>
                </div>
            </div>
            
            <div id="view-crm" class="view-container hidden">
                <div class="p-4">
                    <h2>CRM Console</h2>
                    <div id="crm-content"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module" src="src/app.js"></script>
</body>
</html>
